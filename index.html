<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Pinball</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Mini Pinball</h1>
          <p>GitHub Pages 版簡化彈珠台</p>
        </div>
        <div class="hud">
          <div class="hud-card">
            <span class="label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="hud-card">
            <span class="label">Status</span>
            <strong id="status">Ready</strong>
          </div>
        </div>
      </header>

      <section class="instructions">
        <span>鍵盤：← / → 控制左右拍板</span>
        <span>鍵盤：R 重新開始</span>
        <span>手機：用下方按鈕操作</span>
      </section>

      <section class="board-wrap">
        <div class="playfield-shell">
          <canvas id="gameCanvas" width="480" height="720" aria-label="Mini Pinball Canvas"></canvas>
          <button id="touchLeftZone" class="touch-zone touch-zone--left" type="button" aria-label="左半邊觸控區"></button>
          <button id="touchRightZone" class="touch-zone touch-zone--right" type="button" aria-label="右半邊觸控區"></button>
          <button id="overlayRestartBtn" class="overlay-restart" type="button">Game Over / Tap to Restart</button>
        </div>
      </section>

      <section class="mobile-controls mobile-controls--secondary" aria-label="Restart Control">
        <button id="restartBtn" class="control-btn control-btn--secondary control-btn--wide" type="button">↻ 重新開始</button>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
